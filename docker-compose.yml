version: '3.9'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: planetarium
      POSTGRES_USER: planetarium
      POSTGRES_PASSWORD: planetarium
    ports:
      - "5432:5432"
